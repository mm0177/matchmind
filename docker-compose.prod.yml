# Production Docker Compose - pulls pre-built images from Docker Hub
# No building on EC2, no dev mounts, no --reload
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# To update after pushing new images:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    image: ${DOCKERHUB_USER:-matchmind}/matchmind-backend:latest
    restart: unless-stopped
    env_file: .env.prod
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy

  celery-worker:
    image: ${DOCKERHUB_USER:-matchmind}/matchmind-backend:latest
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env.prod
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  celery-beat:
    image: ${DOCKERHUB_USER:-matchmind}/matchmind-backend:latest
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env.prod
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis

  frontend:
    image: ${DOCKERHUB_USER:-matchmind}/matchmind-frontend:latest
    restart: unless-stopped
    env_file: .env.prod
    expose:
      - "3000"

volumes:
  redis_data:
